# This workflow automatically creates and pushes a new tag to the repository
# when a pull request from 'adsk-merge-branch' is merged into 'adsk_contrib/dev'.
# The tag is based on the latest upstream FINAL release tag, the current date
# (YYYYMMDD), and the .dev_adsk suffix. It can also be run manually via
# workflow_dispatch to (re)tag adsk_contrib/dev when an auto-run is missed.
name: Create Tag on automer PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - adsk_contrib/dev
  workflow_dispatch:  # Allow manual runs, e.g. to re-tag when an auto-run was missed or failed.

jobs:
  create-tag:
    env:
      # Repository and branch configuration for tag automation
      UPSTREAM_REPO: https://github.com/AcademySoftwareFoundation/MaterialX.git
    # Run automatically when an automerge PR (adsk-merge-branch -> adsk_contrib/dev)
    # is merged, or on manual dispatch -- but only when dispatched against
    # adsk_contrib/dev, so a manual run can't accidentally tag another branch.
    if: >
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/adsk_contrib/dev') ||
        (github.event.pull_request.merged == true &&
         github.event.pull_request.base.ref == 'adsk_contrib/dev' &&
         github.event.pull_request.head.ref == 'adsk-merge-branch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the ASF repo tags

          if git remote add upstream "$UPSTREAM_REPO"; then
            echo "Remote 'upstream' added successfully."
          else
            echo "Failed to add remote 'upstream'."
            exit 1
          fi

          if git fetch upstream --tags; then
            echo "Fetched tags from 'upstream' successfully."
          else
            echo "Failed to fetch tags from 'upstream'."
            exit 1
          fi

          # Get the latest FINAL release tag from the ASF repo.
          # --refs drops peeled annotated-tag refs (the "<tag>^{}" lines), and the
          # grep keeps only vMAJOR.MINOR.PATCH tags so pre-releases (e.g. -rc1) are
          # excluded. Otherwise version:refname sorts "-rc1" *after* the final tag,
          # so tail -n1 would pick the release candidate (or the invalid "^{}" ref).
          latest_tag=$(git ls-remote --refs --tags --sort=version:refname upstream \
            | sed 's#.*refs/tags/##' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | tail -n1)
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

          # Validate that a valid tag was obtained.
          if [ -z "$latest_tag" ] || [ "$latest_tag" = "refs/tags/" ]; then
              echo "Failed to get valid latest tag"
              exit 1
          fi

      - name: Tag the repository
        id: tag_repo
        env:
          latest_tag: ${{ steps.get_latest_tag.outputs.latest_tag }}
        run: |
          # Get the current date in YYYYMMDD format
          date_stamp=$(date +"%Y%m%d")

          # Construct the new tag using the latest upstream tag and the date
          new_tag="${latest_tag}.${date_stamp}.dev_adsk"
          echo "new_tag=${new_tag}"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

          # Apply the new tag
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Check if the new tag already exists to avoid duplicates or race conditions
          if git tag -l "${new_tag}" | grep -q "${new_tag}"; then
            echo "Tag ${new_tag} already exists. Skipping."
            exit 0
          fi
          
          # Create and push the new tag to the repository
          if git tag ${new_tag}; then
            echo "Tag created successfully."
          else
            echo "Failed to create tag."
            exit 1
          fi

          if git push origin ${new_tag}; then
            echo "Tag pushed successfully."
          else
            echo "Failed to push tag."
            exit 1
          fi

      # Only comment when triggered by a merged PR (no PR context on manual dispatch).
      - name: Comment on PR with new tag
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
            NEW_TAG: ${{ steps.tag_repo.outputs.new_tag }}
        with:
            script: |
                github.rest.issues.createComment({
                    issue_number: context.payload.pull_request.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: `:bookmark: Tag for this merge: \`${process.env.NEW_TAG}\``
                });